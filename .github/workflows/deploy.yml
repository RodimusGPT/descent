name: Deploy to GitHub Pages

# Builds the static Astro site and publishes it to GitHub Pages on every push to
# the default branch. This is a PROJECT page served from https://<owner>.github.io/<repo>/,
# so the build needs a `base` path — injected below from the repo name (no hard-coding).
#
# One-time repo setup: Settings → Pages → Build and deployment → Source =
# "GitHub Actions".

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Least-privilege token + the OIDC permission deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight production deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Project-page deploy: serve from /<repo>/. Inject base + site so the repo name
    # is never hard-coded — astro.config reads these from process.env.
    env:
      PUBLIC_BASE: /${{ github.event.repository.name }}/
      PUBLIC_SITE: https://${{ github.repository_owner }}.github.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # withastro/action installs deps (auto-detecting Bun from bun.lock), runs
      # `astro build`, writes a `.nojekyll` marker, and uploads dist/ as the
      # Pages artifact.
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          package-manager: bun@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
